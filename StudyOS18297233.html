<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Study OS</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: black;
    background-size: cover;
    color: white;
    overflow: hidden;
}

/* LOCK SCREEN */
#lockScreen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: 0.8s;
}
#lockScreen.hidden {
    opacity: 0;
    transform: scale(1.1);
}
#lockScreen h1 {
    font-size: 70px;
    animation: float 3s infinite;
}
@keyframes float {
    50% {transform: translateY(-10px);}
}

/* Dock */
.dock {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    background: rgba(0,0,0,0.7);
    padding: 12px 25px;
    border-radius: 30px;
}
.icon img {
    width: 45px;
    transition: 0.3s;
}
.icon:hover img {
    transform: scale(1.5) translateY(-10px);
}

/* Windows */
.window {
    display: none;
    position: absolute;
    top: 120px;
    left: 120px;
    width: 350px;
    background: black;
    border: 1px solid white;
    border-radius: 12px;
    padding: 15px;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.3s;
}
.window.active {
    display: block;
    opacity: 1;
    transform: scale(1);
}
.titlebar {
    display: flex;
    justify-content: space-between;
    border-bottom: 1px solid white;
    cursor: move;
}

/* Inputs */
input, textarea {
    width: 100%;
    background: black;
    color: white;
    border: 1px solid white;
}

/* Buttons */
button {
    border: 1px solid white;
    background: black;
    color: white;
    padding: 6px;
    cursor: pointer;
}
button:hover {
    background: white;
    color: black;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
    <h1 id="timeDisplay"></h1>
    <p id="battery"></p>
    <p id="quote"></p>
    <small>Click to unlock</small>
</div>

<!-- Dock -->
<div class="dock">
    <div class="icon" onclick="openApp('timer')"><img src="https://img.icons8.com/fluency/48/timer.png"></div>
    <div class="icon" onclick="openApp('tasks')"><img src="https://img.icons8.com/fluency/48/task.png"></div>
    <div class="icon" onclick="openApp('stats')"><img src="https://img.icons8.com/fluency/48/combo-chart.png"></div>
    <div class="icon" onclick="openApp('calc')"><img src="https://img.icons8.com/fluency/48/calculator.png"></div>
    <div class="icon" onclick="openApp('notes')"><img src="https://img.icons8.com/fluency/48/note.png"></div>
    <div class="icon" onclick="openChrome()"><img src="https://img.icons8.com/color/48/chrome--v1.png"></div>
    <div class="icon" onclick="openChatGPT()"><img src="https://img.icons8.com/fluency/48/bot.png"></div>

    <!-- SPOTIFY -->
    <div class="icon" onclick="openSpotify()"><img src="https://img.icons8.com/fluency/48/spotify.png"></div>

    <div class="icon" onclick="openApp('settings')"><img src="https://img.icons8.com/fluency/48/settings.png"></div>
</div>

<!-- TIMER -->
<div id="timer" class="window">
<div class="titlebar"><b>Pomodoro</b><button onclick="closeApp('timer')">❌</button></div>

<p id="mode">Study</p>
<h2 id="time">25:00</h2>

<p>Study (min):</p>
<input id="studyTimeInput">

<p>Break (min):</p>
<input id="breakTimeInput">

<button onclick="setPomodoroTimes()">Set</button>
<button onclick="startTimer()">Start</button>
<button onclick="pauseTimer()">Pause</button>
<button onclick="resetTimer()">Reset</button>
</div>

<!-- TASKS -->
<div id="tasks" class="window">
<div class="titlebar"><b>Tasks</b><button onclick="closeApp('tasks')">❌</button></div>
<input id="taskInput">
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>

<!-- NOTES -->
<div id="notes" class="window">
<div class="titlebar"><b>Notes</b><button onclick="closeApp('notes')">❌</button></div>
<textarea id="note"></textarea>
</div>

<!-- SETTINGS -->
<div id="settings" class="window">
<div class="titlebar"><b>Settings</b><button onclick="closeApp('settings')">❌</button></div>

<button onclick="setWallpaper('https://wallpaperaccess.com/full/317501.jpg')">Ocean</button>
<button onclick="setWallpaper('black')">Black</button>

<input id="customWall" placeholder="Paste image URL">
<button onclick="setCustomWallpaper()">Custom</button>
</div>

<script>

/* LOCK SCREEN */
lockScreen.onclick=()=>{
lockScreen.classList.add("hidden");
setTimeout(()=>lockScreen.style.display="none",800);
};

/* TIME */
function updateTime(){
let d=new Date();
timeDisplay.innerText=
d.getHours().toString().padStart(2,'0')+":"+
d.getMinutes().toString().padStart(2,'0');
}
setInterval(updateTime,1000); updateTime();

/* BATTERY */
navigator.getBattery().then(b=>{
function u(){battery.innerText="Battery: "+Math.floor(b.level*100)+"%";}
u(); b.addEventListener("levelchange",u);
});

/* QUOTES */
let quotes=[
"Stay focused.","Discipline wins.","Push yourself.",
"Dream big.","Make today count.","Stay hungry.",
"Don’t quit.","You got this.","Be consistent.",
"Focus beats distraction.","Win the day."
];
function setQuote(){
let el=quote;
el.style.opacity=0;
setTimeout(()=>{
el.innerText='"'+quotes[new Date().getDate()%quotes.length]+'"';
el.style.opacity=1;
},300);
}
setQuote();

/* WINDOWS */
function openApp(id){document.getElementById(id).classList.add("active")}
function closeApp(id){document.getElementById(id).classList.remove("active")}

/* CHROME + AI */
function openChrome(){window.open("https://google.com")}
function openChatGPT(){window.open("https://chatgpt.com")}

/* SPOTIFY */
function openSpotify(){
    window.open("https://open.spotify.com");
}

/* DRAG */
document.querySelectorAll(".window").forEach((w,i)=>{
let pos=JSON.parse(localStorage.getItem("win"+i)||"{}");
if(pos.left){w.style.left=pos.left; w.style.top=pos.top;}

w.onmousedown=e=>{
let x=e.clientX-w.offsetLeft,y=e.clientY-w.offsetTop;
document.onmousemove=e=>{
w.style.left=e.clientX-x+"px";
w.style.top=e.clientY-y+"px";
}
document.onmouseup=()=>{
document.onmousemove=null;
localStorage.setItem("win"+i,JSON.stringify({
left:w.style.left, top:w.style.top
}));
};
};
});

/* TASKS SAVE */
function createTask(text){
let li=document.createElement("li");
li.innerText=text;
li.onclick=()=>{li.remove(); saveTasks();};
return li;
}
function addTask(){
if(!taskInput.value) return;
taskList.appendChild(createTask(taskInput.value));
taskInput.value="";
saveTasks();
}
function saveTasks(){
let arr=[];
document.querySelectorAll("#taskList li").forEach(li=>arr.push(li.innerText));
localStorage.setItem("tasks",JSON.stringify(arr));
}
function loadTasks(){
(JSON.parse(localStorage.getItem("tasks")||"[]"))
.forEach(t=>taskList.appendChild(createTask(t)));
}
loadTasks();

/* NOTES AUTO SAVE */
note.value=localStorage.getItem("note")||"";
note.oninput=()=>localStorage.setItem("note",note.value);

/* TIMER SAVE */
let studyTime=parseInt(localStorage.getItem("studyTime"))||1500;
let breakTime=parseInt(localStorage.getItem("breakTime"))||300;
let time=studyTime,isStudy=true,int;

function setPomodoroTimes(){
let s=parseInt(studyTimeInput.value),
b=parseInt(breakTimeInput.value);
if(s){studyTime=s*60; localStorage.setItem("studyTime",studyTime);}
if(b){breakTime=b*60; localStorage.setItem("breakTime",breakTime);}
time=studyTime;
}
function startTimer(){
clearInterval(int);
int=setInterval(()=>{
time--;
if(time<=0){
isStudy=!isStudy;
time=isStudy?studyTime:breakTime;
alert(isStudy?"Study":"Break");
}
let m=Math.floor(time/60),s=time%60;
document.getElementById("time").innerText=
`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
},1000);
}
function pauseTimer(){clearInterval(int)}
function resetTimer(){time=studyTime}

/* WALLPAPER SAVE */
function setWallpaper(url){
if(url==="black"){
document.body.style.background="black";
}else{
document.body.style.background=`url('${url}') center/cover fixed`;
}
localStorage.setItem("wallpaper",url);
}
function setCustomWallpaper(){setWallpaper(customWall.value);}

let savedWall=localStorage.getItem("wallpaper");
if(savedWall) setWallpaper(savedWall);

</script>

</body>
</html>
